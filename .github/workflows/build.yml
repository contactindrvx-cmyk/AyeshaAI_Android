# --- عائشہ AI اینڈرائیڈ APK بلڈ ورک فلو (STABLE AUTO-INSTALL) ---
name: Build Ayesha AI APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python_version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev ant openjdk-17-jdk
        pip install --upgrade pip
        pip install buildozer kivy cython

    # --- خودکار طریقے سے اینڈرائیڈ ٹولز سیٹ اپ کرنا ---
    - name: Set up Android SDK
      run: |
        # یہاں ہم بلڈوزر کو خود فائلیں ڈاؤن لوڈ کرنے دیں گے، بس لائسنس ایگری کریں گے
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        yes | buildozer android debug --setup-only

    - name: Build with Buildozer
      run: |
        # 'yes |' ڈالنا ضروری ہے تاکہ لائسنس خود بخود Accept ہو جائیں
        yes | buildozer android debug
      env:
        ANDROID_SDK_LICENSE_AGREED: 'yes'
        ACCEPT_LICENSES: 'yes'

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Ayesha_AI_Debug_APK
        path: bin/*.apk
        
