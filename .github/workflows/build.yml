# --- عائشہ AI اینڈرائیڈ APK بلڈ ورک فلو (UPDATED FIX) ---
name: Build Ayesha AI APK

on:
  push:
    branches: [ "main" ] # جب بھی مین برانچ پر پش ہوگا، یہ چلے گا
  workflow_dispatch: # یا آپ اسے خود بھی چلا سکتے ہیں

jobs:
  build:
    runs-on: ubuntu-latest # گٹ ہب کے کمپیوٹر کا نام

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # ہماری فائلیں کاپی کرے گا

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python_version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Build Dependencies
      # (FIX: Added '--fix-missing' and updated dependencies list)
      run: |
        sudo apt-get update --fix-missing
        # Buildozer کو چلانے کے لیے ضروری ٹولز
        sudo apt-get install -y --fix-missing git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev ant openjdk-17-jdk
        pip install --upgrade pip
        pip install buildozer kivy android

    - name: Build with Buildozer
    # (یہ سٹیپ ویسا ہی رہے گا)
      run: |
        # ہم نے جو buildozer.spec فائل بنائی تھی، اسے استعمال کر کے ایپ بلڈ ہوگی
        # یہ سٹیپ تھوڑا وقت لے سکتا ہے (15-20 منٹ)
        buildozer android debug
      env:
        # اینڈرائیڈ SDK/NDK کو قبول کرنے کے لیے
        ANDROID_SDK_LICENSE_AGREED: 'yes'
        ACCEPT_LICENSES: 'yes'

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4 # Updated artifact upload version
      with:
        name: Ayesha_AI_Debug_APK # اس نام سے آپ کو فائل ملے گی
        # بلڈ ٹول APK فائل یہاں بناتا ہے
        path: bin/*.apk
        
