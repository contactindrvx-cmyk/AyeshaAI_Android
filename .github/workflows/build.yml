# --- عائشہ AI اینڈرائیڈ APK بلڈ ورک فلو (UPDڈر v4) ---
name: Build Ayesha AI APK

on:
  push:
    branches: [ "main" ] # جب بھی مین برانچ پر پش ہوگا، یہ چلے گا
  workflow_dispatch: # یا آپ اسے خود بھی چلا سکتے ہیں

jobs:
  build:
    runs-on: ubuntu-latest # گٹ ہب کے کمپیوٹر کا نام

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # (Updated to v4) ہماری فائلیں کاپی کرے گا

    - name: Set up Python
      uses: actions/setup-python@v5 # (Updated to v5)
      with:
        python_version: '3.10'

    - name: Install Build Dependencies
    # (یہ سٹیپ ویسا ہی رہے گا)
      run: |
        sudo apt-get update
        # Buildozer کو چلانے کے لیے ضروری ٹولز
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install --upgrade pip
        pip install buildozer kivy android

    - name: Build with Buildozer
    # (یہ سٹیپ ویسا ہی رہے گا)
      run: |
        # ہم نے جو buildozer.spec فائل بنائی تھی، اسے استعمال کر کے ایپ بلڈ ہوگی
        # یہ سٹیپ تھوڑا وقت لے سکتا ہے (15-20 منٹ)
        buildozer android debug
      env:
        # اینڈرائیڈ SDK/NDK کو قبول کرنے کے لیے
        ANDROID_SDK_LICENSE_AGREED: 'yes'
        ACCEPT_LICENSES: 'yes'

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4 # (FIX: Updated from v3 to v4) اس نام سے آپ کو فائل ملے گی
      with:
        name: Ayesha_AI_Debug_APK 
        # بلڈ ٹول APK فائل یہاں بناتا ہے
        path: bin/*.apk
        
