name: Build Ayesha AI APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python_version: '3.10'

    # پرو ٹپ: مستری کی ڈیمانڈ پر واپس Java 17 پر آ گئے ہیں
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        # یہاں بھی openjdk-17-jdk کر دیا گیا ہے
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
        pip install --upgrade pip
        pip install buildozer "Cython<3.0" virtualenv

    - name: Build with Buildozer
      run: buildozer android debug
      env:
        ANDROID_SDK_LICENSE_AGREED: 1
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Ayesha_AI_App
        path: bin/*.apk
        
