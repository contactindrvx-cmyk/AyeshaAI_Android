name: Build Ayesha AI APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python_version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev ant openjdk-17-jdk
        pip install --upgrade pip
        pip install buildozer kivy cython

    - name: Build with Buildozer
      run: |
        # یہ کمانڈ خودکار طریقے سے اینڈرائیڈ ایس ڈی کے سیٹ اپ کرے گی
        yes | buildozer android debug
      env:
        ANDROID_SDK_LICENSE_AGREED: 'yes'
        ACCEPT_LICENSES: 'yes'

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Ayesha_AI_App
        path: bin/*.apk
        
