name: Build Ayesha AI APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python_version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev ant openjdk-17-jdk
        pip install --upgrade pip
        pip install buildozer kivy cython

    # --- یہ نیا حصہ ہے جو AIDL کا مسئلہ حل کرے گا ---
    - name: Pre-install Android Build Tools
      run: |
        # بلڈوزر کے فولڈر بنائیں
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/build-tools
        # گوگل سے اینڈرائیڈ ٹولز ڈاؤن لوڈ کریں
        wget https://dl.google.com/android/repository/build-tools_r31.0.0-linux.zip
        # فائل کو ان زپ کریں
        unzip build-tools_r31.0.0-linux.zip
        # فولڈر کو صحیح جگہ پر منتقل کریں
        mv android-12 /home/runner/.buildozer/android/platform/android-sdk/build-tools/31.0.0
        # صفائی کریں
        rm build-tools_r31.0.0-linux.zip

    - name: Build with Buildozer
      run: |
        yes | buildozer android debug
      env:
        ANDROID_SDK_LICENSE_AGREED: 'yes'
        ACCEPT_LICENSES: 'yes'

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Ayesha_AI_Debug_APK
        path: bin/*.apk
        
