name: Build Ayesha AI APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    # پرو ٹپ: ubuntu-latest کی جگہ 22.04 استعمال کر رہے ہیں جو سب سے زیادہ اسٹیبل ہے
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python_version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        # غیر ضروری ٹولز ہٹا کر صرف وہ رکھے ہیں جو بلڈوزر کو واقعی چاہیے
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Build with Buildozer
      # 'yes |' کو ہٹا دیا گیا ہے تاکہ Broken Pipe کا ایرر جڑ سے ختم ہو جائے
      run: buildozer android debug
      env:
        # یہ کمانڈز خودکار طریقے سے گوگل کے لائسنس قبول کر لیں گی
        ANDROID_SDK_LICENSE_AGREED: 1
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Ayesha_AI_App
        path: bin/*.apk
        
